<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Ani Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="app">
        <div id="navbar-container"></div>
        
        <div id="chat-box"></div>
        
        <div id="footer-container"></div>
    </div>

    <!-- Auth Modal -->
    <div class="ani-auth-overlay open gated" id="ani-auth-overlay">
      <div class="ani-auth-modal" role="dialog" aria-modal="true">
        <h2 class="ani-auth-title">Welcome Back</h2>
        <p class="ani-auth-sub">Sign in to chat with <strong>Ani</strong></p>

        <div class="ani-auth-error" id="ani-auth-error"></div>

        <button class="ani-github-btn" id="ani-btn-github" type="button">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          Continue with GitHub
        </button>
      </div>
    </div>

    <!-- Profile Panel -->
    <div class="ani-profile-overlay" id="ani-profile-overlay">
      <div class="ani-profile-panel">
        <div class="ani-profile-header">
          <h3>Your Profile</h3>
          <button class="ani-profile-close" id="ani-profile-close">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="ani-profile-avatar-area">
          <div class="ani-profile-big-avatar" id="ani-profile-big-avatar"></div>
          <p class="ani-profile-email-display" id="ani-profile-email-display"></p>
        </div>

        <div class="ani-profile-fields">
          <label class="ani-profile-label">Display Name</label>
          <input class="ani-profile-input" id="ani-profile-name-input" type="text" placeholder="Your name" maxlength="40" autocomplete="name">

          <label class="ani-profile-label">Photo URL <span class="ani-profile-label-note">(paste any image link)</span></label>
          <input class="ani-profile-input" id="ani-profile-photo-input" type="url" placeholder="https://...">

          <div class="ani-profile-preview" id="ani-profile-preview" style="display:none">
            <img id="ani-profile-preview-img" src="" alt="preview">
          </div>
        </div>

        <button class="ani-profile-save-btn" id="ani-profile-save-btn">Save Changes</button>
        <div class="ani-profile-msg" id="ani-profile-msg"></div>
        <button class="ani-profile-signout-btn" id="ani-profile-signout-btn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Sign Out
        </button>
      </div>
    </div>

    <script src="main.js"></script>
    <script type="module">
      import {
        signInWithGitHub, signOut, onAuthChange,
        getAccessToken, updateUserProfile,
        getUserDisplayName, getUserAvatarUrl,
        getOAuthError
      } from '/supabase-client.js';

      window.getAniIdToken = () => getAccessToken();

      const overlay = document.getElementById('ani-auth-overlay');
      const errBox  = document.getElementById('ani-auth-error');

      function showErr(m) { errBox.textContent = m; errBox.classList.add('visible'); }
      function clearErr() { errBox.classList.remove('visible'); }

      // Show any OAuth redirect error immediately (e.g. GitHub provider not enabled)
      const oauthErr = getOAuthError();
      if (oauthErr) {
        showErr(oauthErr.replace(/_/g, ' '));
        // Remove error params from URL so a refresh doesn't re-show the old error
        history.replaceState(null, '', location.pathname);
      }

      function forceClose() {
        overlay.classList.remove('open', 'gated');
        clearErr();
      }

      document.getElementById('ani-btn-github').addEventListener('click', async () => {
        clearErr();
        const btn = document.getElementById('ani-btn-github');
        btn.disabled = true;
        btn.textContent = 'Redirecting…';
        try { await signInWithGitHub(); }
        catch (e) {
          showErr(e?.message || 'Sign-in failed. Please try again.');
          btn.disabled = false;
          btn.innerHTML = `<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg> Continue with GitHub`;
        }
      });

      function getInitials(user) {
        const name = getUserDisplayName(user);
        return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      }

      // ── Profile Panel ──────────────────────────────────────────────────
      const profileOverlay    = document.getElementById('ani-profile-overlay');
      const profileClose      = document.getElementById('ani-profile-close');
      const profileNameInput  = document.getElementById('ani-profile-name-input');
      const profilePhotoInput = document.getElementById('ani-profile-photo-input');
      const profileSaveBtn    = document.getElementById('ani-profile-save-btn');
      const profileSignoutBtn = document.getElementById('ani-profile-signout-btn');
      const profileMsg        = document.getElementById('ani-profile-msg');
      const profilePreview    = document.getElementById('ani-profile-preview');
      const profilePreviewImg = document.getElementById('ani-profile-preview-img');
      const profileBigAvatar  = document.getElementById('ani-profile-big-avatar');
      const profileEmailEl    = document.getElementById('ani-profile-email-display');

      function openProfilePanel(user) {
        const displayName = getUserDisplayName(user);
        const avatarUrl   = getUserAvatarUrl(user);
        profileNameInput.value     = displayName;
        profilePhotoInput.value    = avatarUrl || '';
        profileEmailEl.textContent = user.email || '';
        const initials = getInitials(user);
        profileBigAvatar.innerHTML = avatarUrl
          ? `<img src="${avatarUrl}" alt="" referrerpolicy="no-referrer">`
          : `<div class="ani-profile-initials">${initials}</div>`;
        profilePreview.style.display = avatarUrl ? '' : 'none';
        if (avatarUrl) profilePreviewImg.src = avatarUrl;
        profileMsg.textContent = '';
        profileMsg.className = 'ani-profile-msg';
        profileOverlay.classList.add('open');
      }

      function closeProfilePanel() { profileOverlay.classList.remove('open'); }

      profileClose.addEventListener('click', closeProfilePanel);
      profileOverlay.addEventListener('click', e => { if (e.target === profileOverlay) closeProfilePanel(); });

      profilePhotoInput.addEventListener('input', () => {
        const url = profilePhotoInput.value.trim();
        if (url) { profilePreviewImg.src = url; profilePreview.style.display = ''; }
        else      { profilePreview.style.display = 'none'; }
      });

      profileSaveBtn.addEventListener('click', async () => {
        profileSaveBtn.disabled = true;
        profileMsg.textContent = '';
        try {
          await updateUserProfile({
            displayName: profileNameInput.value.trim() || null,
            photoURL:    profilePhotoInput.value.trim() || null,
          });
          profileMsg.textContent = '✓ Profile updated!';
          profileMsg.className = 'ani-profile-msg success';
          setTimeout(closeProfilePanel, 1200);
        } catch (e) {
          profileMsg.textContent = e.message || 'Failed to update.';
          profileMsg.className = 'ani-profile-msg error';
        } finally { profileSaveBtn.disabled = false; }
      });

      profileSignoutBtn.addEventListener('click', async () => {
        closeProfilePanel();
        await signOut();
      });

      // ── Auth State ─────────────────────────────────────────────────────
      onAuthChange((user, _session) => {
        const slot = document.getElementById('ani-user-slot');
        if (user) {
          forceClose();
          const name      = getUserDisplayName(user);
          const avatarUrl = getUserAvatarUrl(user);
          if (!slot) return;
          const initials = getInitials(user);
          slot.innerHTML = `
            <div class="ani-user-info" title="Edit profile">
              ${avatarUrl
                ? `<img src="${avatarUrl}" class="ani-user-avatar" alt="${name}" referrerpolicy="no-referrer">`
                : `<div class="ani-user-avatar ani-user-initials">${initials}</div>`}
            </div>`;
          slot.querySelector('.ani-user-avatar').addEventListener('click', () => openProfilePanel(user));
        } else {
          overlay.classList.add('open', 'gated');
          if (!slot) return;
          slot.innerHTML = '';
        }
      });
    </script>

</body>
</html>
