name: Update README Days Badge

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate days since start
        run: |
          START_DATE="2023-01-01"  # your project start date
          TODAY=$(date +%Y-%m-%d)
          DAYS=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 ))
          echo "DAYS=$DAYS" >> $GITHUB_ENV

      - name: Update README.md
        run: |
          BADGE="![Days since start](https://img.shields.io/badge/Days%20since%20start-${DAYS}-brightgreen)"
          if grep -q "Days since start" README.md; then
            sed -i "s|.*Days since start.*|$BADGE|" README.md
          else
            echo -e "\n$BADGE" >> README.md
          fi

      - name: Commit changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "cid-kageno-dev"
          git config user.email "cidkageno105@gmail.com"
          git add README.md
          git commit -m "Update days badge: $DAYS [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:main
